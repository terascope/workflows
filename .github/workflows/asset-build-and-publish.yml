# NOTE: There are no tests in this publish workflow, which means it assumes that
# the master branch has been tested.  The test-asset.yml should include:
#   push:
#     branches: [ master ]
#   pull_request:
#     branches: [ master ]
# which is meant to test on PRs to master and push to master.

name: Build, Publish and Release Teraslice Asset
run-name: ${{ github.actor }} is building, publishing, and releasing the Teraslice Asset
on:
  workflow_call:
    secrets:
      RELEASES_PRIVATE_KEY:
        required: true
      SLACK_BOT_TOKEN:
        required: true

permissions: {}

jobs:
  # Asset build will occur if any versions are updated
  # NPM publish will occur if a public sub-package version has updated
  # Asset release will occur if the current asset version 
  # is greater than the latest release or pre-release version
  version-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      asset_version_updated: ${{ steps.asset_version_check.outputs.asset_version_updated}}
      package_version_updated: ${{ steps.package_version_check.outputs.package_version_updated}}
      tag: ${{ steps.asset_version_check.outputs.tag}}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - run: pnpm install && pnpm run setup
      
      - name: Check for asset version update
        id: asset_version_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          echo "current version:" $CURRENT_VERSION

          LATEST_RELEASE_VERSION=$(gh release list --exclude-drafts -L 1 --json tagName --jq '.[].tagName')
          echo "latest (pre)release version:" $LATEST_RELEASE_VERSION
          
          COMP_OUTPUT=$(./scripts/semver-tool.sh compare $CURRENT_VERSION $LATEST_RELEASE_VERSION)
          echo "Semver comparison output:" $COMP_OUTPUT

          if [[ "$COMP_OUTPUT" = "1" ]]; then
            echo "Asset version updated from $LATEST_RELEASE_VERSION to $CURRENT_VERSION, creating release"
            echo "asset_version_updated=true" >> $GITHUB_OUTPUT
            echo "tag: v$CURRENT_VERSION"
            echo "tag=v$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Asset version not updated, will not release"
            echo "asset_version_updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for package version updates
        id: package_version_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm publish -r --dry-run --report-summary

          if [ ! -f pnpm-publish-summary.json ]; then
            echo "No publish summary found, skipping"
            echo "package_version_updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TO_BE_PUBLISHED=$(jq -r '.publishedPackages[] | "\(.name)@\(.version)"' pnpm-publish-summary.json)

          if [ -n "$TO_BE_PUBLISHED" ]; then
            echo "Packages being updated:"
            echo "$TO_BE_PUBLISHED"
            echo "package_version_updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "No packages to publish"
            echo "package_version_updated=false" >> "$GITHUB_OUTPUT"
          fi

  asset-build:
    needs: [version-check]
    if: needs.version-check.outputs.asset_version_updated == 'true' || needs.version-check.outputs.package_version_updated == 'true' 
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        # NOTE: Hard Coded Node Version array, should match array in test-asset.yml
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - run: pnpm install && pnpm run setup
      - run: pnpm build
      - run: pnpm dlx teraslice-cli -v
      - run: pnpm dlx teraslice-cli assets build
      - run: ls -l ./build/
      - run: sha256sum ./build/*

      - name: Archive production artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teraslice-asset-${{ matrix.node-version }}
          path: ./build

  # NPM Publish should be done only after builds from all Node versions have completed.
  npm-publish:
    needs: [version-check, asset-build]
    if: needs.version-check.outputs.package_version_updated == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # NOTE: Hard Coded Node Version
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - run: pnpm install && pnpm run setup

      - run: pnpm publish -r --no-git-checks

  # Asset Release should be done only after builds from all Node versions have completed.
  asset-release:
    needs: [version-check, asset-build]
    if: needs.version-check.outputs.asset_version_updated == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # NOTE: Hard Coded Node Version
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Download assets from Teraslice Asset Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./build/
          pattern: teraslice-asset-*
          merge-multiple: true

      - run: ls -l ./build/

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASES_APP_ID }}
          private-key: ${{ secrets.RELEASES_PRIVATE_KEY }}

      - name: Create Release With Assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          prerelease: true
          tag_name: ${{ needs.version-check.outputs.tag }}
          name: ${{ needs.version-check.outputs.tag }}
          generate_release_notes: true
          files: ./build/*.zip

      - name: Announce release in Slack releases channel
        id: announce-release
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASES_CHANNEL_ID }}
            text: |
              ${{ github.repository }} version ${{ needs.version-check.outputs.tag }} has been released.
              Please review and revise the automated release notes:
              https://github.com/${{ github.repository }}/releases/tag/${{ needs.version-check.outputs.tag }}
  
      - name: Failed Announcement Response
        if: ${{ steps.announce-release.outputs.ok == 'false' }}
        env:
          SLACK_RESPONSE: ${{ steps.announce-release.outputs.response }}
        run: echo "Slackbot API failure response - $SLACK_RESPONSE"

  check-for-website:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: read
    outputs:
      website_exists: ${{ steps.find-directory.outputs.website_exists }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Find website directory
        id: find-directory
        run: |
          if [ -d "./website" ]; then
            echo "Website exists. Docs will be published."  
            echo "website_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Website does not exist. Docs will not be published."  
            echo "website_exists=false" >> $GITHUB_OUTPUT
          fi

  build-docs:
    runs-on: ubuntu-latest
    needs: [version-check, check-for-website]
    if: (needs.version-check.outputs.asset_version_updated == 'true' || needs.version-check.outputs.package_version_updated == 'true') && needs.check-for-website.outputs.website_exists == 'true'
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version:  22
          registry-url: 'https://registry.npmjs.org'
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Build documentation
        run: pnpm install && ./scripts/build-documentation.sh  # output in website/build
      - name: Check Output
        run: find ./website/build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./website/build

  publish-docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: build-docs
    permissions:
      pages: write      # to deploy to Pages
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
