name: Test Teraslice Asset
run-name: ${{ github.actor }} is testing the Teraslice Prerelease Asset
on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

permissions: {}

jobs:
  check-docker-limit-before:
    permissions:
      contents: read
    uses: ./.github/workflows/check-docker-limit.yml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  cache-docker-images:
    needs: check-docker-limit-before
    permissions:
      contents: read
    uses: ./.github/workflows/cache-docker-images.yml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  test-linux:
    runs-on: ubuntu-latest
    needs: cache-docker-images
    permissions:
      contents: read
    strategy:
      matrix:
        # NOTE: Hard Coded Node Version array, should match array in build-and-publish-asset.yml
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      # we login to docker to avoid docker pull limit rates
      # secrets are now duplicated for Actions and Dependabot
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: pnpm install && pnpm run setup
      - run: pnpm lint
      - name: Create Docker Image List
        run: |
          pnpm docker:listImages
          cat ./images/image-list.txt
      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@v5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-
      - name: Get Commit Short SHA
        id: get-short-sha
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          calculatedSha=$(git rev-parse --short "$HEAD_SHA")
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_OUTPUT
      - run: pnpm test:all
      - name: Append dev tag to version
        env:
          COMMIT_SHORT_SHA: ${{ steps.get-short-sha.outputs.COMMIT_SHORT_SHA }}
        run: |
          jq --arg sha "$COMMIT_SHORT_SHA" '.version += "-dev." + $sha' asset/asset.json > tempAsset.json && mv tempAsset.json asset/asset.json
          cat asset/asset.json
      - run: pnpm dlx teraslice-cli@prerelease -v
      - run: pnpm dlx teraslice-cli@prerelease assets build
      - run: ls -l build/
      - name: Archive test build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: teraslice-test-asset-${{ matrix.node-version }}-dev.${{ steps.get-short-sha.outputs.COMMIT_SHORT_SHA }}
          path: ./build
          retention-days: 7
      - name: Upload logs artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs.commit-${{ steps.get-short-sha.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}
          path: ./logs/*.log
          retention-days: 3
          if-no-files-found: ignore

  test-e2e:
    runs-on: ubuntu-latest
    needs: cache-docker-images
    permissions:
      contents: read
    strategy:
      matrix:
        # NOTE: Hard Coded Node Version array, should match array in build-and-publish-asset.yml
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      # we login to docker to avoid docker pull limit rates
      # secrets are now duplicated for Actions and Dependabot
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: pnpm install && pnpm run setup
      - name: Create Docker Image List
        run: |
          pnpm docker:listImages
          cat ./images/image-list.txt
      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@v5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-
      - name: Install teraslice-cli
        run: npm install -g teraslice-cli@prerelease
      - name: Get Commit Short SHA
        id: get-short-sha
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          calculatedSha=$(git rev-parse --short "$HEAD_SHA")
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_OUTPUT
      - run: pnpm test:e2e
      - name: Upload logs artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs.commit-${{ steps.get-short-sha.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}
          path: ./logs/*.log
          retention-days: 3
          if-no-files-found: ignore

  test-linux-encrypted:
    runs-on: ubuntu-latest
    needs: cache-docker-images
    permissions:
      contents: read
    strategy:
      matrix:
        # NOTE: Hard Coded Node Version array, should match array in build-and-publish-asset.yml
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      # we login to docker to avoid docker pull limit rates
      # secrets are now duplicated for Actions and Dependabot
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: pnpm install && pnpm run setup
      - run: pnpm lint
      - name: Create Docker Image List
        run: |
          pnpm docker:listImages
          cat ./images/image-list.txt
      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@v5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-
      - name: Install mkcert
        run: curl -Ss -JLO "https://dl.filippo.io/mkcert/v1.4.4?for=linux/amd64" && sudo chmod 777 mkcert-v1.4.4-linux-amd64 && sudo cp mkcert-v1.4.4-linux-amd64 /usr/local/bin/mkcert
      - name: Check mkcert
        run: command -v mkcert
      - name: Get Commit Short SHA
        id: get-short-sha
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          calculatedSha=$(git rev-parse --short "$HEAD_SHA")
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_OUTPUT
      - run: pnpm test:encrypted
      - name: Upload logs artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs.commit-${{ steps.get-short-sha.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}
          path: ./logs/*.log
          retention-days: 3
          if-no-files-found: ignore

  test-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          # NOTE: Hard Coded Node Version
          node-version: '24'
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - run: pnpm install && pnpm run setup
      - run: pnpm lint
      # TODO: Ideally we'd be able to at least run unit tests that don't require docker.
      #- run: pnpm test:all
      - run: pnpm dlx teraslice-cli@prerelease -v
      - run: pnpm dlx teraslice-cli@prerelease assets build
      - run: ls -l build/

  check-for-website:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      website_exists: ${{ steps.find-directory.outputs.website_exists }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find website directory
        id: find-directory
        run: |
          if [ -d "./website" ]; then
            echo "Website exists. Website build will be tested."  
            echo "website_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Website does not exist. Website build will not be tested."  
            echo "website_exists=false" >> $GITHUB_OUTPUT
          fi

  test-website:
    runs-on: ubuntu-latest
    needs: check-for-website
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          # NOTE: Hard Coded Node Version
          node-version: '24'
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Build documentation and Check Output
        if: needs.check-for-website.outputs.website_exists == 'true'
        run: |
          pnpm install
          ./scripts/build-documentation.sh
          find ./website/build

  comment-artifact-urls:
    # skip comment on push event (merge to master) and dependabot PRs
    if: github.event_name != 'push' && github.actor != 'dependabot[bot]'
    needs: [test-linux, test-macos]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
    steps:
      - name: Get Artifacts List
        id: artifacts-list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ARTIFACTS_JSON=$(gh api repos/$REPO/actions/runs/$RUN_ID/artifacts)
          echo $ARTIFACTS_JSON
          ID_LIST=$(echo "$ARTIFACTS_JSON" | jq -c  '[.artifacts[] | {name: .name, id:.id}]')
          echo $ID_LIST
          echo "artifact-ids=$ID_LIST" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ARTIFACT_IDS='${{ steps.artifacts-list.outputs.artifact-ids }}'
          LIST=$(echo "$ARTIFACT_IDS" | jq -r ".[] | \"\(.name): https://github.com/$REPO/actions/runs/$RUN_ID/artifacts/\(.id)\"")
          COMMENT=$(printf "Asset artifacts:\n%s" "$LIST")
          gh api repos/$REPO/issues/$PR_NUMBER/comments -f body="$COMMENT"


  check-docker-limit-after:
    needs: test-linux
    permissions:
      contents: read
    uses: ./.github/workflows/check-docker-limit.yml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  all-tests-passed:
    needs: [test-linux, test-e2e, test-linux-encrypted, test-macos, test-website]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All tests have passed"